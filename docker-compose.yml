version: '3.8'

services:
  api:
    build: .
    command: node --require ./src/instrumentation.js src/api.js
    ports:
      - "4000:4000"
    environment:
      - NODE_ENV=development
      - PORT=4000
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=${MONGO_URI}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - OTEL_SERVICE_NAME=overwatch-pdf-api
      - OTEL_EXPORTER_OTLP_ENDPOINT=https://record-metrics.contrails.ai
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic b3RlbF91c2VyOnN1cGVyX3NlY3JldF9wYXNzd29yZA==
    volumes:
      - .:/app
      - /app/node_modules
      - image-cache-volume:/app/cache/images
    depends_on:
      - redis

  worker:
    build: .
    command: node --require ./src/instrumentation.js src/worker.js
    environment:
      - NODE_ENV=development
      - REDIS_URL=redis://redis:6379
      - MONGO_URI=${MONGO_URI}
      - AWS_ACCESS_KEY_ID=${AWS_ACCESS_KEY_ID}
      - AWS_SECRET_ACCESS_KEY=${AWS_SECRET_ACCESS_KEY}
      - AWS_REGION=${AWS_REGION:-ap-south-1}
      - AWS_S3_BUCKET=${AWS_S3_BUCKET}
      - OTEL_SERVICE_NAME=overwatch-pdf-worker
      - OTEL_EXPORTER_OTLP_ENDPOINT=https://record-metrics.contrails.ai
      - OTEL_EXPORTER_OTLP_PROTOCOL=http/protobuf
      - OTEL_EXPORTER_OTLP_HEADERS=Authorization=Basic b3RlbF91c2VyOnN1cGVyX3NlY3JldF9wYXNzd29yZA==
    deploy:
      resources:
        limits:
          memory: 1.5G
    volumes:
      - .:/app
      - /app/node_modules
      - image-cache-volume:/app/cache/images
    depends_on:
      - redis

  redis:
    image: redis:7-alpine
    ports:
      - "6379:6379"

volumes:
  image-cache-volume:
